<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice English Tutor</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 0;
      height: 100vh;
      color: white;
    }
    .container {
      max-width: 800px;
      margin: 30px auto;
      background: rgba(0,0,0,0.85);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { text-align: center; margin-bottom: 10px; }
    .level { text-align: center; margin-bottom: 20px; }
    .chat {
      height: 420px;
      overflow-y: auto;
      padding: 15px;
      background: #1a1a2e;
      border-radius: 15px;
      margin-bottom: 15px;
    }
    .message {
      margin: 12px 0;
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 80%;
    }
    .user { background: #4e9cff; margin-left: auto; border-bottom-right-radius: 4px; }
    .ai { background: #2a2a3a; margin-right: auto; border-bottom-left-radius: 4px; }
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      padding: 14px 24px;
      font-size: 16px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }
    .mic-btn {
      background: #e74c3c;
      color: white;
      font-size: 18px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
    }
    .mic-btn.listening {
      background: #27ae60;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } }
    input { flex: 1; padding: 15px; border-radius: 50px; border: none; font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗣️ Voice English Tutor</h1>
    <div class="level">
      Level: 
      <select id="level" onchange="changeLevel()">
        <option value="Beginner">Beginner</option>
        <option value="Intermediate" selected>Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
    </div>

    <div class="chat" id="chat"></div>

    <div class="controls">
      <button class="mic-btn" id="micBtn">🎤</button>
      <input type="text" id="textInput" placeholder="Or type here and press Enter..." />
      <button onclick="sendText()">Send</button>
    </div>

    <p style="text-align:center; font-size:14px; margin-top:15px;">
      OpenAI API Key: <input type="password" id="apiKey" placeholder="sk-..." style="width:280px;"/>
    </p>
  </div>

  <script>
    let messages = [];
    let isListening = false;
    let recognition = null;

    const chat = document.getElementById('chat');
    const micBtn = document.getElementById('micBtn');
    const textInput = document.getElementById('textInput');
    const apiKeyInput = document.getElementById('apiKey');

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.innerHTML = `<strong>${sender === 'user' ? 'You' : 'Tutor'}:</strong><br>${text}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.9;
      speechSynthesis.speak(utterance);
    }

    async function sendToAI(userText) {
      const level = document.getElementById('level').value;
      const apiKey = apiKeyInput.value.trim();

      if (!apiKey) {
        alert("Please enter your OpenAI API key");
        return;
      }

      addMessage(userText, 'user');

      const systemPrompt = `You are a friendly and patient English tutor. 
      The student is at ${level} level. 
      Correct their grammar gently, show the corrected sentence, explain mistakes simply, 
      and continue the conversation naturally. Speak like a real teacher.`;

      try {
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              { role: "system", content: systemPrompt },
              ...messages,
              { role: "user", content: userText }
            ],
            temperature: 0.7
          })
        });

        const data = await response.json();
        const reply = data.choices[0].message.content;
        
        messages.push({ role: "user", content: userText });
        messages.push({ role: "assistant", content: reply });

        addMessage(reply, 'ai');
        speak(reply);

      } catch (err) {
        addMessage("Sorry, there was an error. Please check your API key.", 'ai');
      }
    }

    // Voice Recognition
    function startListening() {
      if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        alert("Your browser does not support voice input.");
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;

      recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add('listening');
        micBtn.textContent = '🎙️';
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        sendToAI(transcript);
      };

      recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove('listening');
        micBtn.textContent = '🎤';
      };

      recognition.start();
    }

    micBtn.addEventListener('click', () => {
      if (isListening) {
        recognition.stop();
      } else {
        startListening();
      }
    });

    function sendText() {
      const text = textInput.value.trim();
      if (text) {
        sendToAI(text);
        textInput.value = '';
      }
    }

    textInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendText();
    });

    function changeLevel() {
      messages = [];
      chat.innerHTML = '';
      addMessage("Hello! I'm your personal English tutor. How are you today?", 'ai');
      speak("Hello! I'm your personal English tutor. How are you today?");
    }

    // Start with greeting
    window.onload = () => {
      addMessage("Hello! I'm your personal English tutor. How are you today?", 'ai');
      speak("Hello! I'm your personal English tutor. How are you today?");
    };
  </script>
</body>
</html>
