<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAIREN - Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
            background: #000;
            color: #a5f3fc;
            overflow-x: hidden;
        }
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .bg-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }
        .bg-overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.55);
        }
        .meteor {
            position: absolute;
            z-index: 5;
            width: 180px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0), rgba(191,219,254,0.95));
            filter: drop-shadow(0 0 8px rgba(191,219,254,0.9));
            transform: rotate(-35deg);
            opacity: 0;
            animation: meteor-travel 5s linear infinite;
        }
        .meteor::after {
            content: "";
            position: absolute;
            right: -4px;
            top: -3px;
            height: 8px;
            width: 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.95);
        }
        .meteor-one { top: 24%; left: 11%; animation-delay: 0.2s; }
        .meteor-two { top: 18%; right: 18%; animation-delay: 1.5s; }
        .meteor-three { top: 64%; right: 8%; animation-delay: 2.9s; }
        @keyframes meteor-travel {
            0% { transform: translate3d(0,0,0) rotate(-35deg); opacity: 0; }
            15% { opacity: 1; }
            65% { opacity: 1; }
            100% { transform: translate3d(360px,230px,0) rotate(-35deg); opacity: 0; }
        }
        .sound-btn {
            position: fixed;
            left: 24px;
            top: 32px;
            z-index: 20;
            background: none;
            border: none;
            color: #fb7185;
            cursor: pointer;
            transition: color 0.2s;
        }
        .sound-btn:hover { color: #fda4af; }
        .sound-btn svg {
            width: 36px;
            height: 36px;
            filter: drop-shadow(0 0 10px rgba(244,63,94,0.7));
        }
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .profile-card {
            width: 100%;
            max-width: 28rem;
            border-radius: 24px;
            border: 1px solid rgba(207,250,254,0.2);
            background: rgba(15,23,42,0.35);
            padding: 16px;
            box-shadow: 0 0 40px rgba(22,163,255,0.2);
            backdrop-filter: blur(20px);
            animation: fade-in 0.8s ease-out;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .profile-orb {
            position: relative;
            width: 64px;
            height: 64px;
            isolation: isolate;
        }
        .profile-orb::before {
            content: "";
            position: absolute;
            inset: -3px;
            z-index: -1;
            border-radius: 999px;
            background: conic-gradient(from 0deg, rgba(125,211,252,0.9), rgba(244,114,182,0.9), rgba(125,211,252,0.9));
            animation: spin-ring 2.6s linear infinite;
        }
        .profile-orb::after {
            content: "";
            position: absolute;
            inset: -11px;
            z-index: -2;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(56,189,248,0.45), rgba(15,23,42,0));
            animation: pulse-aura 2.4s ease-in-out infinite;
        }
        @keyframes spin-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulse-aura {
            0%, 100% { transform: scale(0.92); opacity: 0.55; }
            50% { transform: scale(1.06); opacity: 1; }
        }
        .profile-frame {
            position: absolute;
            inset: -6px;
            z-index: 3;
            border-radius: 999px;
            border: 1px solid rgba(125,211,252,0.7);
            box-shadow: inset 0 0 16px rgba(34,211,238,0.45), 0 0 12px rgba(56,189,248,0.45);
            animation: pulse-frame 2s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes pulse-frame {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        .profile-spark {
            position: absolute;
            z-index: 4;
            height: 8px;
            width: 8px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(125,211,252,0.25));
            filter: drop-shadow(0 0 6px rgba(125,211,252,1));
            animation: spark-flicker 1.8s ease-in-out infinite;
            pointer-events: none;
        }
        .profile-spark-one { top: -2px; left: 10%; }
        .profile-spark-two { top: 22%; right: -5px; animation-delay: 0.4s; }
        .profile-spark-three { bottom: -2px; left: 24%; animation-delay: 0.8s; }
        @keyframes spark-flicker {
            0%, 100% { transform: scale(0.75); opacity: 0.55; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        .avatar-media {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(207,250,254,0.7);
        }
        .avatar-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-status {
            position: absolute;
            z-index: 5;
            right: -2px;
            bottom: -2px;
            height: 14px;
            width: 14px;
            border-radius: 999px;
            border: 2px solid rgba(15,23,42,0.85);
            background: radial-gradient(circle at 30% 30%, rgba(134,239,172,1), rgba(22,163,74,1));
            box-shadow: 0 0 10px rgba(74,222,128,0.8);
        }
        .header-text .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: rgba(207,250,254,0.7);
        }
        .header-text h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #fb7185;
        }
        .content-box {
            border-radius: 20px;
            border: 1px solid rgba(103,232,249,0.3);
            background: rgba(22,78,99,0.2);
            padding: 20px;
        }
        .content-box h2 {
            text-align: center;
            font-size: 1.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #67e8f9;
            text-shadow: 0 0 10px rgba(34,211,238,0.6);
            margin-bottom: 20px;
        }
        .content-box p {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            line-height: 1.6;
            color: rgba(103,232,249,0.95);
            margin-bottom: 12px;
        }
        .content-box .highlight {
            font-size: 1.25rem;
            color: #67e8f9;
            margin-top: 16px;
        }
        .social-links {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 999px;
            border: 1px solid rgba(207,250,254,0.3);
            background: rgba(15,23,42,0.45);
            color: #fff;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .social-link:hover {
            border-color: rgba(207,250,254,0.6);
            background: rgba(30,41,59,0.7);
        }
        .social-link svg {
            width: 20px;
            height: 20px;
            transition: transform 0.2s;
        }
        .social-link:hover svg { transform: scale(1.1); }
        .discord { color: #7dd3fc; }
        .youtube { color: #fda4af; }
        .spotify { color: #86efac; }
        @media (max-width: 640px) {
            .profile-card { max-width: 100%; }
            .social-links { grid-template-columns: 1fr; }
            .content-box h2 { font-size: 1.5rem; }
            .content-box .highlight { font-size: 1.125rem; }
        }
    </style>
</head>
<body>

        <img src="https://i.pinimg.com/originals/43/5c/78/435c78f37241e7dac8503f46161bd0e9.gif" alt="Background">
